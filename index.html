<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glam Store | Makyaj Mağazası</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">💄</div>
      <div class="logo-text">
        Glam Store
        <span class="logo-sub">Makyaj Mağazası</span>
      </div>
    </div>

    <button class="cart-btn" onclick="showTab('cart')">
      🛒 Sepetim
      <span class="cart-badge" id="cart-count">0</span>
    </button>
  </header>



  <!-- NAV -->
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('products')">🛍️ Ürünler</button>
    <button class="nav-tab" onclick="showTab('add')">➕ Ürün Ekle</button>
    <button class="nav-tab" onclick="showTab('cart')">🛒 Sepet</button>
  </nav>



  <!-- PRODUCTS -->
  <div id="tab-products" class="section active">
    <div class="page-header">
      <h1 class="page-title">Ürünlerimiz</h1>
      <p class="page-sub">Favori ürününüzü seçin ve sepete ekleyin</p>
    </div>

    <div class="products-grid" id="products"></div>
  </div>



  <!-- ADD PRODUCT -->
  <div id="tab-add" class="section">
    <form id="productForm" class="form-card">

      <h2>➕ Yeni Ürün Ekle</h2>

      <div class="form-group">
        <label>Ürün Adı *</label>
        <input type="text" name="name" placeholder="Örn: Mat Ruj" required />
      </div>

      <div class="form-group">
        <label>Fiyat (₺) *</label>
        <input type="number" name="price" step="0.01" required />
      </div>

      <div class="form-group">
        <label>Stok</label>
        <input type="number" name="stock" />
      </div>

      <div class="form-group">
        <label>Fotoğraf</label>
        <input type="file" name="image" accept="image/*" />
      </div>

      <button type="submit" class="btn-submit">✅ Ürünü Ekle</button>

    </form>
  </div>



  <!-- CART -->
  <div id="tab-cart" class="section">
    <div class="page-header">
      <h1 class="page-title">🛒 Sepetim</h1>
      <p class="page-sub">Seçtiğiniz ürünler</p>
    </div>

    <div class="cart-list" id="cart"></div>
  </div>



  <!-- SCRIPT -->
  <script src="app.js"></script>

</body>
</html>
